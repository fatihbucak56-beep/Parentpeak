name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1

      - name: Prepare env file
        run: cp .env.example .env

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web
        shell: bash
        env:
          BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
          PRIVACY_POLICY_URL: ${{ vars.PRIVACY_POLICY_URL }}
          TERMS_OF_SERVICE_URL: ${{ vars.TERMS_OF_SERVICE_URL }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
          CONTACT_SUPPORT_URL: ${{ vars.CONTACT_SUPPORT_URL }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY }}
          GEMINI_MODEL_NAME: ${{ vars.GEMINI_MODEL_NAME }}
        run: |
          set -o pipefail
          BACKEND_BASE_URL="${BACKEND_BASE_URL:-https://parentpeak.onrender.com}"
          PRIVACY_POLICY_URL="${PRIVACY_POLICY_URL:-https://parentpeak.de/privacy}"
          TERMS_OF_SERVICE_URL="${TERMS_OF_SERVICE_URL:-https://parentpeak.de/terms}"
          CONTACT_EMAIL="${CONTACT_EMAIL:-parentpeakapp@gmail.com}"
          CONTACT_SUPPORT_URL="${CONTACT_SUPPORT_URL:-https://parentpeak.de}"

          flutter build web --release \
            --dart-define=BACKEND_BASE_URL="$BACKEND_BASE_URL" \
            --dart-define=PRIVACY_POLICY_URL="$PRIVACY_POLICY_URL" \
            --dart-define=TERMS_OF_SERVICE_URL="$TERMS_OF_SERVICE_URL" \
            --dart-define=CONTACT_EMAIL="$CONTACT_EMAIL" \
            --dart-define=CONTACT_SUPPORT_URL="$CONTACT_SUPPORT_URL" \
            --dart-define=STRIPE_PUBLISHABLE_KEY="${STRIPE_PUBLISHABLE_KEY}" \
            --dart-define=GEMINI_MODEL_NAME="${GEMINI_MODEL_NAME}" \
            2>&1 | tee flutter-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: flutter-build.log

      - name: SPA fallback for deep links
        run: cp build/web/index.html build/web/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
