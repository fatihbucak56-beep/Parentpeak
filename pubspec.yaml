name: parentpeak
description: Parentpeak App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  firebase_auth: ^6.5.4
  firebase_messaging: ^16.3.0
  shared_preferences: ^2.0.15
  intl: ^0.20.2
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.3.1
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  google_generative_ai: ^0.4.4
  flutter_svg: ^2.2.3
  flutter_tts: ^4.2.5
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  video_player: ^2.9.2
  just_audio: ^0.9.46
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  pdf: ^3.11.3
  printing: ^5.14.3
  crypto: ^3.0.7
  flutter_stripe: ^13.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.3.2
  mocktail: ^0.3.0
  flutter_lints: ^2.0.0
  build_runner: ^2.3.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0C1B1F"
  image: assets/images/app_icon.png
  image_dark: assets/images/app_icon.png
  android_12:
    image: assets/images/app_icon.png
    image_dark: assets/images/app_icon.png
    color: "#FFFFFF"
    color_dark: "#0C1B1F"
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#0C1B1F"
  fullscreen: false
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env