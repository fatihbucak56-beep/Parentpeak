name: trusted_circle_demo
description: Trusted Circle Demo App

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^0.13.4
  firebase_messaging: ^14.0.0
  shared_preferences: ^2.0.15
  intl: ^0.20.2
  flutter_dotenv: ^5.0.2
  flutter_secure_storage: ^8.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.3.2
  mocktail: ^0.3.0
  flutter_lints: ^2.0.0
  build_runner: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/