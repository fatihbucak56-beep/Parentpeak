name: trusted_circle_demo
description: Trusted Circle Demo App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  shared_preferences: ^2.0.15
  intl: ^0.20.2
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.3.1
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  google_generative_ai: ^0.4.4
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.3.2
  mocktail: ^0.3.0
  flutter_lints: ^2.0.0
  build_runner: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/